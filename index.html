<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mein CRM</title>
<style>
  :root{
    --bg:#f4f6fb; --panel:#ffffff; --ink:#1f2733; --muted:#6b7688;
    --line:#e4e8f0; --brand:#2f6bff; --brand-d:#1f4fd6;
    --green:#1eae6b; --amber:#e6a417; --red:#e0483d; --purple:#8b5cf6;
    --shadow:0 1px 3px rgba(18,28,45,.08),0 8px 24px rgba(18,28,45,.06);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--ink);font-size:14px;line-height:1.45}
  button{font-family:inherit;font-size:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit;font-size:14px}

  /* Layout */
  .app{display:flex;min-height:100vh}
  .side{width:216px;flex-shrink:0;background:#0f1626;color:#c7d0e0;display:flex;flex-direction:column;
    position:sticky;top:0;height:100vh}
  .brand{padding:14px 14px;display:flex;align-items:center;justify-content:center}
  .brandlogo{width:100%;max-width:172px;display:block;background:#fff;border-radius:11px;padding:9px 11px}
  .projsel{padding:0 12px 12px;border-bottom:1px solid rgba(255,255,255,.08);margin-bottom:6px}
  .projsel label{font-size:10px;letter-spacing:.6px;color:#7c8aa5;font-weight:700;display:block;margin-bottom:5px}
  .projsel .prow{display:flex;gap:6px}
  .projsel select{flex:1;min-width:0;background:#1b2436;color:#e6ebf5;border:1px solid rgba(255,255,255,.14);border-radius:8px;padding:7px 8px;font-weight:600}
  .projsel select:focus{outline:none;border-color:var(--brand)}
  .projsel .prow button{background:var(--brand);color:#fff;border:none;border-radius:8px;width:34px;flex-shrink:0;font-size:18px;line-height:1;cursor:pointer}
  .projsel .prow button:hover{background:var(--brand-d)}
  .projsel .pactions{display:flex;gap:12px;margin-top:7px;font-size:11px;color:#8494ad}
  .projsel .pactions span{cursor:pointer}
  .projsel .pactions span:hover{color:#c7d0e0}
  .langsel{margin-bottom:9px}
  .langsel select{width:100%;background:#1b2436;color:#e6ebf5;border:1px solid rgba(255,255,255,.14);border-radius:8px;padding:6px 8px;font-weight:600;font-size:12.5px}
  .langsel select:focus{outline:none;border-color:var(--brand)}
  .brand .dot{width:11px;height:11px;border-radius:3px;background:var(--brand)}
  .nav{padding:6px 10px;flex:1}
  .nav a{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:9px;color:#c7d0e0;
    text-decoration:none;font-weight:500;margin-bottom:2px;transition:.12s}
  .nav a:hover{background:rgba(255,255,255,.06);color:#fff}
  .nav a.active{background:var(--brand);color:#fff}
  .nav a .ic{width:18px;text-align:center;font-size:15px}
  .nav a .badge{margin-left:auto;background:rgba(255,255,255,.14);border-radius:20px;padding:1px 8px;font-size:11px;font-weight:600}
  .nav a.active .badge{background:rgba(255,255,255,.25)}
  .storage{padding:12px;border-top:1px solid rgba(255,255,255,.08);font-size:12px}
  .storage .st-row{display:flex;align-items:center;gap:7px;margin-bottom:8px;color:#9aa6bd}
  .storage .st-dot{width:8px;height:8px;border-radius:50%;background:var(--amber)}
  .storage.ok .st-dot{background:var(--green)}
  .btn{border:none;border-radius:8px;padding:8px 12px;font-weight:600;background:var(--brand);color:#fff;transition:.12s}
  .btn:hover{background:var(--brand-d)}
  .btn.ghost{background:rgba(255,255,255,.1);color:#e6ebf5}
  .btn.ghost:hover{background:rgba(255,255,255,.18)}
  .btn.sm{padding:5px 10px;font-size:12.5px;border-radius:7px}
  .btn.block{width:100%}
  .btn.sec{background:#eef1f7;color:var(--ink)}
  .btn.sec:hover{background:#e2e7f0}
  .btn.danger{background:#fdeceb;color:var(--red)}
  .btn.danger:hover{background:#fbdad7}

  /* Main */
  .main{flex:1;min-width:0;display:flex;flex-direction:column}
  .top{background:var(--panel);border-bottom:1px solid var(--line);padding:16px 26px;
    display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:20}
  .top h1{margin:0;font-size:20px;font-weight:700}
  .top .sub{color:var(--muted);font-size:12.5px;margin-top:1px}
  .search{margin-left:auto;position:relative}
  .search input{width:240px;padding:9px 12px 9px 34px;border:1px solid var(--line);border-radius:9px;background:#fff}
  .search input:focus{outline:none;border-color:var(--brand)}
  .search .mag{position:absolute;left:11px;top:9px;color:var(--muted)}
  .content{padding:24px 26px;flex:1}

  /* Cards & tables */
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px 18px;box-shadow:var(--shadow)}
  .stat .lbl{color:var(--muted);font-size:12.5px;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
  .stat .val{font-size:28px;font-weight:800;margin-top:6px}
  .stat .foot{font-size:12px;color:var(--muted);margin-top:4px}
  .stat .ic{float:right;font-size:20px;opacity:.9}

  .panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);overflow:hidden}
  .panel .ph{display:flex;align-items:center;padding:15px 18px;border-bottom:1px solid var(--line)}
  .panel .ph h3{margin:0;font-size:15px}
  .panel .ph .btn{margin-left:auto}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:20px}

  table{width:100%;border-collapse:collapse}
  th{text-align:left;font-size:11.5px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);
    font-weight:600;padding:11px 18px;border-bottom:1px solid var(--line);background:#fafbfd}
  td{padding:12px 18px;border-bottom:1px solid var(--line);vertical-align:middle}
  tr:last-child td{border-bottom:none}
  tbody tr:hover{background:#f8faff;cursor:pointer}
  tr.selrow{background:#eaf1ff!important}
  .card.donecard{opacity:.62;background:#f4f7f4}
  .card.donecard .t{text-decoration:line-through}
  .act.selrow{background:#eaf1ff}
  .card.selrow{outline:2px solid var(--brand);outline-offset:-1px}
  .selbox{width:17px;height:17px;accent-color:var(--brand);cursor:pointer;vertical-align:middle}
  .bulkbar{display:flex;align-items:center;gap:12px;background:#0f1626;color:#fff;padding:11px 16px;border-radius:11px;margin-bottom:14px;box-shadow:var(--shadow)}
  .bulkbar .cnt{font-weight:700}
  .av{width:32px;height:32px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;
    font-weight:700;color:#fff;font-size:12px;flex-shrink:0}
  .cellname{display:flex;align-items:center;gap:10px}
  .cellname .meta{font-size:12px;color:var(--muted)}
  .tag{display:inline-block;background:#eef1f7;color:#4a566b;border-radius:20px;padding:2px 9px;font-size:11.5px;font-weight:600;margin:1px}
  .pill{display:inline-block;border-radius:20px;padding:3px 10px;font-size:11.5px;font-weight:700}
  .empty{padding:48px 20px;text-align:center;color:var(--muted)}
  .empty .big{font-size:34px;margin-bottom:8px}
  .muted{color:var(--muted)}
  .link{color:var(--brand);text-decoration:none;font-weight:600}
  .link:hover{text-decoration:underline}
  .right{text-align:right}

  /* Kanban */
  .board{display:grid;grid-template-columns:repeat(6,minmax(180px,1fr));gap:14px;overflow-x:auto;padding-bottom:8px}
  .col{background:#eef1f7;border-radius:13px;padding:10px;min-height:120px}
  .col.dragover{outline:2px dashed var(--brand);outline-offset:-2px}
  .col h4{margin:2px 4px 10px;font-size:12.5px;display:flex;align-items:center;gap:6px}
  .col h4 .cnt{background:#fff;border-radius:20px;padding:0 8px;font-size:11px;color:var(--muted)}
  .col h4 .sum{margin-left:auto;font-size:11px;color:var(--muted);font-weight:600}
  .card{background:#fff;border-radius:10px;padding:11px 12px;margin-bottom:9px;box-shadow:0 1px 2px rgba(18,28,45,.06);
    border:1px solid var(--line);cursor:grab}
  .card:active{cursor:grabbing}
  .card .t{font-weight:600;margin-bottom:4px}
  .card .v{font-weight:800;color:var(--green)}
  .card .c{font-size:12px;color:var(--muted);margin-top:3px}
  .dot-s{width:9px;height:9px;border-radius:50%;display:inline-block}

  /* Activities */
  .act{display:flex;align-items:flex-start;gap:12px;padding:13px 18px;border-bottom:1px solid var(--line)}
  .act:last-child{border-bottom:none}
  .act .cb{margin-top:2px;width:19px;height:19px;flex-shrink:0;cursor:pointer;accent-color:var(--brand)}
  .act.done .at{text-decoration:line-through;color:var(--muted)}
  .act .aic{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .act .body{flex:1;min-width:0}
  .act .at{font-weight:600}
  .act .am{font-size:12.5px;color:var(--muted);margin-top:2px}
  .act .due{font-size:12px;font-weight:600;white-space:nowrap}
  .due.over{color:var(--red)} .due.today{color:var(--amber)} .due.fut{color:var(--muted)}

  /* Modal */
  .ov{position:fixed;inset:0;background:rgba(15,22,38,.5);display:none;align-items:flex-start;justify-content:center;
    z-index:100;padding:40px 16px;overflow:auto}
  .ov.show{display:flex}
  .modal{background:#fff;border-radius:16px;width:100%;max-width:560px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
  .modal .mh{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center}
  .modal .mh h3{margin:0;font-size:17px}
  .modal .mh .x{margin-left:auto;background:none;border:none;font-size:22px;color:var(--muted);line-height:1}
  .modal .mb{padding:20px 22px}
  .modal .mf{padding:15px 22px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end}
  .fld{margin-bottom:14px}
  .fld label{display:block;font-weight:600;font-size:12.5px;margin-bottom:5px;color:#3a4char}
  .fld label{color:#42506a}
  .fld input,.fld select,.fld textarea{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:9px;background:#fff}
  .fld input:focus,.fld select:focus,.fld textarea:focus{outline:none;border-color:var(--brand)}
  .fld textarea{resize:vertical;min-height:70px}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}

  .detail-sec{margin-top:18px}
  .detail-sec h4{font-size:12px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);margin:0 0 8px}
  .kv{display:flex;padding:6px 0;border-bottom:1px solid var(--line)}
  .kv .k{width:120px;color:var(--muted);font-size:13px}
  .kv .v{flex:1;font-weight:500}
  .hide{display:none!important}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#0f1626;color:#fff;
    padding:11px 20px;border-radius:10px;font-weight:600;box-shadow:var(--shadow);z-index:200;opacity:0;
    transition:.25s;pointer-events:none}
  .toast.show{opacity:1}
  .loginov{position:fixed;inset:0;z-index:500;background:#0f1626;display:flex;align-items:center;justify-content:center;padding:20px}
  .logincard{background:#fff;border-radius:18px;padding:34px 30px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.35);text-align:center}
  .logincard .loginlogo{height:70px;margin:0 auto 14px;background:no-repeat center/contain}
  .logincard h2{margin:0 0 4px;font-size:22px}
  .logincard .loginmsg{min-height:18px;margin:0 0 14px;font-size:13px;color:var(--red);font-weight:600}
  .logincard input{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:10px;margin-bottom:11px;font-size:15px}
  .logincard input:focus{outline:none;border-color:var(--brand)}
  .logincard .btn.block{padding:12px;font-size:15px;margin-top:3px}
  .loginswitch{margin-top:16px;font-size:13px;color:var(--muted)}
  .loginswitch a{color:var(--brand);font-weight:600;cursor:pointer}
  body.role-user .btn.danger{display:none!important}
  body.role-user .projsel .prow button{display:none}
  body.role-user .projsel .pactions{display:none}
  body.role-user .teamnav{display:none!important}
  .ttbl th,.ttbl td{padding:7px 10px;border-bottom:1px solid var(--line)}
  .ttbl thead th{border-bottom:2px solid var(--line);font-size:12px;color:var(--muted);font-weight:700}
  .ttbl tbody tr:hover{background:#f7f9fc}
  .ttbl select{padding:3px 6px;border:1px solid var(--line);border-radius:6px;font-size:13px}
  @media(max-width:820px){.stats{grid-template-columns:1fr 1fr}.grid2{grid-template-columns:1fr}.side{width:70px}
    .brand span,.nav a .txt,.storage .lbl-t{display:none}}
</style>
</head>
<body>
<div id="loginOverlay" class="loginov hide">
  <div class="logincard">
    <div class="loginlogo"></div>
    <h2 id="loginTitle">Anmelden</h2>
    <p class="loginmsg" id="loginMsg"></p>
    <input id="loginEmail" type="email" placeholder="E-Mail" autocomplete="username">
    <input id="loginPass" type="password" placeholder="Passwort" autocomplete="current-password">
    <button class="btn block" id="loginBtn">Anmelden</button>
    <div class="loginswitch">Noch kein Konto? <a id="loginToggle">Registrieren</a></div>
  </div>
</div>

  if(ld&&!ld.options.length)ld.innerHTML=LANGS.map(([c,n])=>`<option value="${c}">${n}</option>`).join("");

function blankData(){return {contacts:[],companies:[],deals:[],activities:[]};}
function migrate(raw){
  if(raw&&raw.projects&&raw.data&&raw.current&&raw.data[raw.current]){
    for(const k in raw.data)raw.data[k]={...blankData(),...raw.data[k]};
    if(!raw.projects.some(p=>p.id===raw.current))raw.current=raw.projects[0].id;
    return raw;
  }
  if(raw&&Array.isArray(raw.contacts)){const pid=uid();
    return {v:2,projects:[{id:pid,name:"SAP"}],current:pid,data:{[pid]:{...blankData(),...raw}}};}
  const pid=uid();
  return {v:2,projects:[{id:pid,name:"SAP"}],current:pid,data:{[pid]:blankData()}};
}

const pnorm=s=>(s==null?"":String(s)).toLowerCase().replace(/[^a-z0-9äöüßàâçéèêëîïôûùñ]/g,"");
function parseCSV(text){
  const rows=[]; let row=[],f="",i=0,q=false,n=text.length;
  while(i<n){const c=text[i];
    if(q){ if(c==='"'){ if(text[i+1]==='"'){f+='"';i++;} else q=false; } else f+=c; }
    else{ if(c==='"')q=true; else if(c===','){row.push(f);f="";} else if(c==='\n'){row.push(f);rows.push(row);row=[];f="";} else if(c!=='\r')f+=c; }
    i++;
  }
  if(f.length||row.length){row.push(f);rows.push(row);}
  return rows;
}
async function loadProspects(h){
  const file=await h.getFile(); const text=await file.text();
  const rows=parseCSV(text); if(rows.length<2){toast("Datei leer");return;}
  const head=rows[0].map(x=>(x||"").trim().toLowerCase()); const ix=n=>head.indexOf(n);
  const iN=ix("firmenname"),iB=ix("branche"),iW=ix("website"),iT=ix("telefon"),iA=ix("adresse"),iL=ix("land"),iX=ix("notizen");
  if(iN<0){toast("Spalte „Firmenname“ fehlt");return;}
  const out=[],lset=new Set(),bset=new Set();
  for(let r=1;r<rows.length;r++){const row=rows[r]; if(!row||!row[iN])continue;
    const o={name:row[iN]||"",branche:iB>=0?(row[iB]||""):"",website:iW>=0?(row[iW]||""):"",tel:iT>=0?(row[iT]||""):"",adr:iA>=0?(row[iA]||""):"",land:iL>=0?(row[iL]||""):"",notes:iX>=0?(row[iX]||""):""};
    o._hay=pnorm(o.name+" "+o.branche+" "+o.adr+" "+o.land);
    out.push(o); if(o.land)lset.add(o.land); if(o.branche)bset.add(o.branche);
  }
  prospectRows=out;
  prospectMeta={lands:[...lset].sort((a,b)=>a.localeCompare(b)),branches:[...bset].sort((a,b)=>a.localeCompare(b)),fileName:file.name};
  const badge=$("#b-prospects"); if(badge)badge.textContent=out.length>9999?Math.round(out.length/1000)+"k":out.length;
  if(state.view==="prospects")renderAll();
  toast(out.length.toLocaleString("de-DE")+" "+pt("loaded"));
}
async function connectProspects(){

  try{
    let h=await idbGet("prospectHandle");
    if(h){ try{ if((await h.requestPermission({mode:"read"}))!=="granted") h=null; }catch(e){h=null;} }
    if(!h){ const picked=await window.showOpenFilePicker({types:[{description:"CSV",accept:{"text/csv":[".csv"],"application/vnd.ms-excel":[".csv"],"text/plain":[".csv"]}}]}); h=picked[0]; await idbSet("prospectHandle",h); }
    await loadProspects(h);

}
async function reconnectProspects(){

}

function idb(){return new Promise((res,rej)=>{const r=indexedDB.open("crm-store",1);

      .on('postgres_changes',{event:'*',schema:'public',table:'contacts'},onRemoteChange)
      .on('postgres_changes',{event:'*',schema:'public',table:'deals'},onRemoteChange)
      .on('postgres_changes',{event:'*',schema:'public',table:'activities'},onRemoteChange)
      .on('postgres_changes',{event:'*',schema:'public',table:'projects'},onRemoteProjects)
      .subscribe(st=>{ rtStatus=String(st); setRtBadge();
        if(st==='CHANNEL_ERROR'||st==='TIMED_OUT'){ clearTimeout(rtRetry); rtRetry=setTimeout(startRealtime,4000); } });
  };
  try{ app.auth.getSession().then(r=>{ const s=r&&r.data&&r.data.session;
    if(s&&app.realtime&&app.realtime.setAuth){ try{app.realtime.setAuth(s.access_token);}catch(e){} }

async function connectFile(existing){
  if(!window.showSaveFilePicker){
    alert("Automatisches Speichern braucht Chrome oder Edge. In Safari nutze bitte Export/Import.");return;}
  try{
    let h;
    if(existing){[h]=await window.showOpenFilePicker({types:[{description:"CRM Daten",accept:{"application/json":[".json"]}}]});}
    else{h=await window.showSaveFilePicker({suggestedName:"crm-daten.json",
      types:[{description:"CRM Daten",accept:{"application/json":[".json"]}}]});}
    fileHandle=h; await idbSet("fileHandle",h);
    if(existing){const f=await h.getFile();const txt=await f.text();
      if(txt.trim()){store=migrate(JSON.parse(txt));useProject(store.current);}}
    await save(); renderAll(); toast(existing?"Datei geladen":"Datei verbunden — wird jetzt automatisch gespeichert");
  }catch(e){if(e.name!=="AbortError")alert("Fehler: "+e.message);}
}
async function verifyPerm(h){
  const opts={mode:"readwrite"};
  if((await h.queryPermission(opts))==="granted")return true;
  if((await h.requestPermission(opts))==="granted")return true;
  return false;
}
async function tryReconnect(){
  const h=await idbGet("fileHandle");if(!h)return;
  if(await verifyPerm(h)){fileHandle=h;try{const f=await h.getFile();const txt=await f.text();
    if(txt.trim()){store=migrate(JSON.parse(txt));useProject(store.current);}}catch(e){}
    setStorage(true,"Synchronisiert");renderAll();}
  else{setStorage(false,"Klicke zum Verbinden");}
}

/* ---- Next-Action & Lead-Score (regelbasiert, 0 €, kein externer KI-Dienst) ---- */
// createdAt ist bei lokal neu angelegten Datensätzen eine Zahl (Date.now()), bei aus Supabase geladenen
// Datensätzen aber ein ISO-Zeitstempel-Text (r.created_at) -> hier robust auf Millisekunden normalisieren.
function toMs(t){if(!t)return 0;if(typeof t==="number")return t;const ms=new Date(t).getTime();return isNaN(ms)?0:ms;}
function lastTouch(d){const acts=db.activities.filter(a=>a.dealId===d.id||(d.contactId&&a.contactId===d.contactId));
  const ts=acts.map(a=>toMs(a.createdAt));return ts.length?Math.max(...ts):toMs(d.createdAt);}
function daysSince(ts){return ts?Math.floor((Date.now()-ts)/86400000):999;}
const STALE_DAYS=7;
function staleOpenDeals(){
  return db.deals.filter(d=>d.stage!=="gewonnen"&&d.stage!=="verloren"&&!d.done)
    .map(d=>({d,days:daysSince(lastTouch(d))}))
    .filter(x=>x.days>=STALE_DAYS)
    .filter(x=>!db.activities.some(a=>a.dealId===x.d.id&&!a.done))
    .sort((a,b)=>b.days-a.days);
}
function dealScore(d){
  const acts=db.activities.filter(a=>a.dealId===d.id);
  const days=daysSince(lastTouch(d));
  let score=Math.max(0,40-Math.round(days*40/14)); // Reaktionszeit: je frischer der letzte Kontakt, desto mehr Punkte
  score+=Math.min(40,acts.length*10);              // Engagement: Anzahl verknüpfter Aktivitäten
  score+=d.value?20:0;                             // Rate-/Wert-Passung: Tagessatz hinterlegt
  return Math.max(0,Math.min(100,score));
}
function scoreColor(s){return s>=70?"var(--green)":s>=40?"#e6a417":"var(--red)";}

function dealTimeEntries(id){return db.activities.filter(a=>a.type==="timesheet"&&a.dealId===id).sort((a,b)=>(b.dueDate||"").localeCompare(a.dueDate||""));}
function parseHoursFromTitle(t){const m=(t||"").match(/^(\d+(?:[.,]\d+)?)\s*h\b/i);return m?parseFloat(m[1].replace(",",".")):0;}
function dealHoursSum(id){return Math.round(dealTimeEntries(id).reduce((s,a)=>s+parseHoursFromTitle(a.title),0)*100)/100;}
function timesheetForm(dealId){const d=byId(db.deals,dealId);if(!d)return;
  const entries=dealTimeEntries(dealId),sum=dealHoursSum(dealId);
  openModal(`

      ${entries.length?`<div class="detail-sec"><h4>Einträge</h4>${entries.map(a=>`<div class="kv"><div class="v">${a.dueDate?new Date(a.dueDate).toLocaleDateString("de-DE"):"—"} · ${esc(a.title)}</div><div class="right"><span style="cursor:pointer;color:var(--red)" onclick="delActivity('${a.id}');timesheetForm('${dealId}')" title="Löschen">✕</span></div></div>`).join("")}</div>`:""}
      <div class="detail-sec"><h4>Neuer Eintrag</h4>
      <form id="tf" onsubmit="return saveTimesheet(event,'${dealId}')">
        <div class="row2"><div class="fld"><label>Datum</label><input name="date" type="date" value="${inDays(0)}"></div>
          <div class="fld"><label>Stunden *</label><input name="hours" type="number" step="0.25" min="0.25" required></div></div>
        <div class="fld"><label>Tätigkeit</label><input name="desc" placeholder="z. B. Onsite-Support"></div>
      </form></div>
    </div>
    <div class="mf"><button class="btn sec" onclick="closeModal()">Schließen</button>
      <button class="btn" onclick="document.getElementById('tf').requestSubmit()">Eintragen</button></div>`);}
function saveTimesheet(e,dealId){e.preventDefault();const f=Object.fromEntries(new FormData(e.target));
  const hours=parseFloat((f.hours||"0").replace(",",".")||"0")||0;if(hours<=0)return false;
  db.activities.push({id:uid(),createdAt:Date.now(),done:true,type:"timesheet",
    title:hours+"h"+(f.desc?" – "+f.desc:""),dueDate:f.date||inDays(0),contactId:"",dealId,notes:f.desc||""});
  scheduleSave();timesheetForm(dealId);renderAll();toast("Stunden erfasst");return false;}

function actRow(a,selectable){
  const t=ACT_TYPES[a.type]||ACT_TYPES.task, di=daysInfo(a.dueDate);
  const rel=a.contactId?contactName(a.contactId):(a.dealId?byId(db.deals,a.dealId)?.title:"");
  return `<div class="act ${a.done?"done":""} ${selectable&&sel.has(a.id)?"selrow":""}">

function viewActivities(){
  const list=db.activities.filter(a=>matchSearch(`${a.title} ${a.notes} ${contactName(a.contactId)}`));
  visibleIds=list.map(a=>a.id);
  sel.forEach(id=>{if(!byId(db.activities,id))sel.delete(id);});

let dragId=null;
function dragStart(e,id){dragId=id;e.dataTransfer.effectAllowed="move";}
function dragOver(e){e.preventDefault();e.currentTarget.classList.add("dragover");}
function dragLeave(e){e.currentTarget.classList.remove("dragover");}
function dropDeal(e){e.preventDefault();e.currentTarget.classList.remove("dragover");

// ---- CSV / TSV parser (handles quotes, newlines, ;/,/tab) ----
function detectDelim(txt){const head=txt.split(/\r?\n/)[0]||"";
  const counts={",":(head.match(/,/g)||[]).length,";":(head.match(/;/g)||[]).length,"\t":(head.match(/\t/g)||[]).length};

  const rowsHtml=stages.map(function(x){return '<tr><td>'+x[1]+'</td><td class="right"><b>'+((g[x[0]]||[]).length)+'</b> Deals</td></tr>';}).join("");
  const kt=(g["kontaktiert"]||[]).length;

    +'<table style="width:100%;font-size:12.5px;margin-bottom:8px"><tbody>'+rowsHtml+'</tbody></table>'
    +(kt?'<div class="muted" style="font-size:12px;margin-bottom:8px">Hinweis: '+kt+' Deal(s) in Phase „Vorgestellt" haben kein Excel-Blatt und werden nicht geschrieben.</div>':'')
    +'<div style="font-size:12px;color:#1eae6b;margin-bottom:10px">✔ Vor dem Schreiben wird automatisch ein Backup heruntergeladen (Downloads-Ordner).</div>'
    +'<button class="btn" onclick="pipelineWriteApply()">📤 Jetzt in Excel schreiben</button> <button class="btn sec" onclick="closeModal()">Abbrechen</button>';
}
async function pipelineWriteApply(){
  const step=document.getElementById("pipeStep");
  try{
    const h=await idbGet("pipelineHandle");if(!h){alert("Bitte zuerst die Datei verbinden.");return;}
    if(h.queryPermission&&(await h.queryPermission({mode:"readwrite"}))!=="granted"){ if((await h.requestPermission({mode:"readwrite"}))!=="granted"){alert("Kein Schreibzugriff auf die Datei erlaubt.");return;} }
    if(step)step.innerHTML='<span class="muted">Lese Excel + Backup…</span>';
    const file=await h.getFile();const buf=await file.arrayBuffer();const origU8=new Uint8Array(buf.slice(0));
    const ts=new Date().toISOString().replace(/:/g,"-").replace("T","_").slice(0,16);
    pipeDownload(origU8,"pipeline_1_backup_"+ts+".xlsx");
    const g=pipeGroupDeals();const items=parseZipEntries(origU8);const replace={};
    for(const it of items){ if(/^xl\/worksheets\/sheet/.test(it.name)){
      const xml=new TextDecoder().decode(it.method===0?it.comp:await inflateRaw(it.comp));
      const tm=xml.match(/<c r="A1"[^>]*><is><t>([^<]*)<\/t>/);const stage=PIPE_TITLE2STAGE[pipeNorm(tm?tm[1]:"")];
      if(stage)replace[it.name]=new TextEncoder().encode(xlsxSheetRewrite(xml,g[stage]||[]));
    }}
    if(step)step.innerHTML='<span class="muted">Schreibe Excel…</span>';
    const out=await buildXlsx(origU8,replace);
    const w=await h.createWritable();await w.write(out);await w.close();
    closeModal();toast("Excel aktualisiert ✔ — Backup liegt in Downloads.");
  }catch(e){ if(step)step.innerHTML='<span style="color:var(--red)">Fehler: '+esc(e.message)+'</span>'; }
}

async function parseAnyFile(file){
  if(/\.xlsx$/i.test(file.name))return readXlsx(await file.arrayBuffer());
  return parseCSV(await file.text());
}
const normH=s=>(s||"").trim().toLowerCase();
async function handleImportFiles(fileList){
  const files=[...fileList];if(!files.length)return;
  const step2=$("#impStep2");
  step2.innerHTML=`<div class="muted" style="padding:14px 0">${files.length} Datei(en) werden gelesen…</div>`;
  imp.headers=[];imp.rows=[];imp.fileInfo=[];
  try{
    for(const file of files){
      let rows;
      try{rows=await parseAnyFile(file);}catch(e){imp.fileInfo.push({name:file.name,count:0,note:"Fehler: "+e.message});continue;}
      if(!rows.length){imp.fileInfo.push({name:file.name,count:0,note:"leer"});continue;}
      const headers=rows[0].map(h=>(h||"").trim()),data=rows.slice(1);
      if(!imp.headers.length){
        imp.headers=headers;imp.rows.push(...data);
        imp.fileInfo.push({name:file.name,count:data.length,note:""});
      }else{
        const master=imp.headers.map(normH);
        const idxMap=headers.map(h=>master.indexOf(normH(h))); // source col -> target col (or -1)
        const matched=idxMap.filter(i=>i>=0).length;let note="";
        for(const r of data){
          const nr=new Array(imp.headers.length).fill("");
          if(matched>0){for(let c=0;c<r.length;c++){const t=idxMap[c];if(t>=0)nr[t]=r[c];}}
          else{for(let c=0;c<Math.min(r.length,nr.length);c++)nr[c]=r[c];} // no name overlap -> by position
          imp.rows.push(nr);
        }
        note=matched>0?(matched<headers.length||idxMap.some(i=>i<0)?"per Spaltennamen zugeordnet":""):"andere Spalten — nach Position übernommen";
        imp.fileInfo.push({name:file.name,count:data.length,note});
      }
    }
    if(!imp.headers.length)throw new Error("Keine lesbaren Daten gefunden");
    autoMap();renderMapping();
  }catch(e){step2.innerHTML=`<div class="pill" style="background:#fdeceb;color:var(--red);padding:8px 12px;display:block">Fehler: ${esc(e.message)}</div>`;}
}
function autoMap(){imp.map={};const used=new Set();
  for(const [field] of IMPORT_FIELDS[imp.type]){
    const keys=GUESS[field]||[field];
    let best=-1;
    imp.headers.forEach((h,i)=>{if(used.has(i))return;const hl=h.toLowerCase();
      if(keys.some(k=>hl===k)){best=i;}});
    if(best<0)imp.headers.forEach((h,i)=>{if(used.has(i)||best>=0)return;const hl=h.toLowerCase();
      if(keys.some(k=>hl.includes(k)))best=i;});
    if(best>=0){imp.map[field]=best;used.add(best);}
  }
}
function renderMapping(){
  const fields=IMPORT_FIELDS[imp.type];
  const opts=sel=>`<option value="">— nicht importieren —</option>`+
    imp.headers.map((h,i)=>`<option value="${i}" ${i===sel?"selected":""}>${esc(h||("Spalte "+(i+1)))}</option>`).join("");
  const preview=imp.rows.slice(0,3);
  const fi=imp.fileInfo||[];

      ${fi.map(f=>`<div class="kv"><div class="v">${esc(f.name)}</div><div class="right muted">${f.count} Zeilen${f.note?" · "+esc(f.note):""}</div></div>`).join("")}</div>`:""}
    <div class="detail-sec"><h4>Spalten zuordnen — ${imp.rows.length} Zeilen erkannt</h4>
      ${fields.map(([f,l])=>`<div class="kv" style="align-items:center">
        <div class="k" style="width:180px">${l}</div>
        <div class="v"><select onchange="imp.map['${f}']=this.value===''?undefined:+this.value">${opts(imp.map[f])}</select></div>
      </div>`).join("")}
    </div>
    <div class="detail-sec"><h4>Vorschau</h4>
      <div style="overflow-x:auto;border:1px solid var(--line);border-radius:8px">
      <table><thead><tr>${imp.headers.map(h=>`<th>${esc(h)}</th>`).join("")}</tr></thead>
      <tbody>${preview.map(r=>`<tr>${imp.headers.map((_,i)=>`<td>${esc(r[i]||"")}</td>`).join("")}</tr>`).join("")}</tbody></table></div></div>`;
  $("#impGo").disabled=false;
}
function findOrCreateCompany(name){name=(name||"").trim();if(!name)return"";
  let c=db.companies.find(x=>x.name.toLowerCase()===name.toLowerCase());
  if(!c){c={id:uid(),createdAt:Date.now(),name,industry:"",website:"",phone:"",address:"",notes:""};db.companies.push(c);}
  return c.id;}
function findContactByName(name){name=(name||"").trim().toLowerCase();if(!name)return"";
  const c=db.contacts.find(x=>`${x.firstName} ${x.lastName}`.trim().toLowerCase()===name);return c?c.id:"";}
function impDate(v){v=(v||"").trim();if(!v)return"";
  if(/^\d{4}-\d{2}-\d{2}/.test(v))return v.slice(0,10);
  if(/^\d{4,5}$/.test(v)){const d=new Date(Date.UTC(1899,11,30+ +v));return d.toISOString().slice(0,10);} // excel serial
  const m=v.match(/^(\d{1,2})[.\/](\d{1,2})[.\/](\d{2,4})/); // dd.mm.yyyy / dd/mm/yyyy
  if(m){let y=+m[3];if(y<100)y+=2000;return `${y}-${String(+m[2]).padStart(2,"0")}-${String(+m[1]).padStart(2,"0")}`;}
  const d=new Date(v);return isNaN(d)?"":d.toISOString().slice(0,10);}
function impStage(v){v=(v||"").trim().toLowerCase();const s=curStagesRaw().find(x=>x.id===v||x.name.toLowerCase()===v);return s?s.id:"lead";}
function impType(v){v=(v||"").trim().toLowerCase();for(const[k,o]of Object.entries(ACT_TYPES))if(k===v||o.l.toLowerCase()===v)return k;return"task";}
function cell(r,f){const i=imp.map[f];return i==null?"":(r[i]||"").trim();}
function runImport(){
  let count=0;const t=imp.type;
  for(const r of imp.rows){
    if(t==="contacts"){
      let fn=cell(r,"firstName"),ln=cell(r,"lastName");
      if(!fn&&!ln&&imp.map.fullName!=null){const parts=cell(r,"fullName").split(/\s+/);fn=parts.shift()||"";ln=parts.join(" ");}
      if(!fn&&!ln)continue;
      db.contacts.push({id:uid(),createdAt:Date.now(),firstName:fn,lastName:ln,
        companyId:findOrCreateCompany(cell(r,"company")),position:cell(r,"position"),
        email:cell(r,"email"),phone:cell(r,"phone"),
        tags:cell(r,"tags").split(/[,;]/).map(x=>x.trim()).filter(Boolean),notes:cell(r,"notes")});count++;
    }else if(t==="companies"){
      const name=cell(r,"name");if(!name)continue;
      db.companies.push({id:uid(),createdAt:Date.now(),name,industry:cell(r,"industry"),
        website:cell(r,"website"),phone:cell(r,"phone"),address:cell(r,"address"),notes:cell(r,"notes")});count++;
    }else if(t==="deals"){
      const title=cell(r,"title");if(!title)continue;
      db.deals.push({id:uid(),createdAt:Date.now(),title,value:parseFloat((cell(r,"value")||"0").replace(/[^\d,.-]/g,"").replace(",","."))||0,
        stage:impStage(cell(r,"stage")),companyId:findOrCreateCompany(cell(r,"company")),
        contactId:findContactByName(cell(r,"contact")),closeDate:impDate(cell(r,"closeDate")),notes:cell(r,"notes")});count++;
    }else if(t==="activities"){
      const title=cell(r,"title");if(!title)continue;
      db.activities.push({id:uid(),createdAt:Date.now(),done:false,title,type:impType(cell(r,"type")),
        dueDate:impDate(cell(r,"dueDate")),contactId:findContactByName(cell(r,"contact")),dealId:"",notes:cell(r,"notes")});count++;
    }
  }
  scheduleSave();closeModal();state.view=t;renderAll();toast(count+" "+ENTITY_LABEL[t]+" importiert");
}

let msalInstance=null, msalAccount=null;
const GRAPH_SCOPES=["Mail.Read","User.Read"];
function getClientId(){return localStorage.getItem("msalClientId")||"09a95784-e6d7-4dd5-a060-eae4c7cd4feb";}
function initMsal(){
  if(msalInstance)return msalInstance;
  if(typeof msal==="undefined"){alert("Microsoft-Login-Bibliothek nicht geladen.\n\nBraucht Internet UND die Seite muss über http://localhost… laufen (nicht als Datei geöffnet).");return null;}
  if(!getClientId()){alert("Bitte zuerst die Azure Client-ID eintragen und speichern.");return null;}
  msalInstance=new msal.PublicClientApplication({
    auth:{clientId:getClientId(),authority:"https://login.microsoftonline.com/common",redirectUri:location.origin+location.pathname},
    cache:{cacheLocation:"localStorage"}});
  return msalInstance;
}
async function graphToken(){
  const app=initMsal();if(!app)return null;
  let acct=msalAccount||app.getAllAccounts()[0];
  try{
    if(!acct){const r=await app.loginPopup({scopes:GRAPH_SCOPES});acct=r.account;}
    msalAccount=acct;
    const t=await app.acquireTokenSilent({scopes:GRAPH_SCOPES,account:acct});return t.accessToken;
  }catch(e){
    try{const r=await app.acquireTokenPopup({scopes:GRAPH_SCOPES});msalAccount=r.account;return r.accessToken;}
    catch(e2){alert("Anmeldung fehlgeschlagen: "+(e2.message||e2));return null;}
  }
}
async function fetchOutlookInquiries(){
  const tok=await graphToken();if(!tok)return;
  toast("Anfragen werden geladen…");
  const url="https://graph.microsoft.com/v1.0/me/messages?$top=50&$select=subject,from,receivedDateTime,bodyPreview,internetMessageId&$orderby=receivedDateTime%20desc";
  let msgs=[];
  try{const r=await fetch(url,{headers:{Authorization:"Bearer "+tok}});const j=await r.json();
    if(j.error)throw new Error(j.error.message);msgs=j.value||[];}
  catch(e){alert("Graph-Fehler: "+(e.message||e));return;}
  const me=((msalAccount&&msalAccount.username)||"").toLowerCase();
  const rx=/(sap|projekt|project|consultant|berater|remote|freelance|anfrage|opportunity|position|rate|ewm|s\/4|inhouse)/i;
  const items=msgs.filter(m=>m.from&&m.from.emailAddress&&(m.from.emailAddress.address||"").toLowerCase()!==me)
    .map(m=>({id:m.internetMessageId,subject:m.subject||"(kein Betreff)",fromName:(m.from.emailAddress.name||""),
      fromAddr:(m.from.emailAddress.address||""),date:(m.receivedDateTime||"").slice(0,10),
      preview:m.bodyPreview||"",isSap:rx.test((m.subject||"")+" "+(m.bodyPreview||""))}));
  showInquiryReview(items);
}

      else{const parts=i.fromName.split(/\s+/);
        const c={id:uid(),createdAt:Date.now(),firstName:parts[0],lastName:parts.slice(1).join(" "),
          companyId:cid,position:"",email:i.fromAddr,phone:"",tags:["Outlook-Anfrage"],notes:""};
        db.contacts.push(c);ctid=c.id;}
    }
    db.deals.push({id:uid(),createdAt:Date.now(),title:i.subject,value:0,stage:"lead",companyId:cid,contactId:ctid,
      closeDate:i.date,notes:"Aus Outlook ("+i.date+"): "+i.preview.slice(0,220)});
    done.add(i.id);n++;
  });
  localStorage.setItem("outlookImportedIds",JSON.stringify([...done]));
  scheduleSave();closeModal();state.view="deals";state.search="";sel.clear();$("#searchInput").value="";renderAll();
  toast(n+" Anfrage(n) als Deals übernommen");
}
function saveClientId(){localStorage.setItem("msalClientId",$("#msalCid").value.trim());msalInstance=null;toast("Client-ID gespeichert");}
function outlookMenu(){
  const served=location.protocol!=="file:";
  openModal(`
    <div class="mh"><h3>Outlook-Anbindung</h3><button class="x" onclick="closeModal()">×</button></div>
    <div class="mb">
      <p class="muted" style="margin-top:0">Holt eingehende Anfragen aus deinem Outlook direkt als Deals (Phase „Anfrage") ins CRM. Einmalige Azure-Einrichtung nötig.</p>
      ${served?"":'<p style="background:#fdeceb;color:var(--red);padding:9px 12px;border-radius:8px;font-size:13px;margin-top:0">Die Seite läuft als Datei (file://). Für den Microsoft-Login bitte über <b>http://localhost…</b> öffnen (siehe Anleitung).</p>'}
      <div class="fld"><label>Azure App Client-ID</label>
        <input id="msalCid" value="${esc(getClientId())}" placeholder="11111111-2222-3333-4444-555555555555"></div>
      <div class="row2"><button class="btn sec block" onclick="saveClientId()">ID speichern</button>
        <button class="btn block" onclick="fetchOutlookInquiries()">Anfragen abrufen</button></div>
      <p class="muted" style="font-size:12px;margin-bottom:0">Beim ersten Abruf öffnet sich das Microsoft-Login-Fenster. Es werden nur E-Mails gelesen (Mail.Read), nichts gesendet oder gelöscht.</p>
    </div>
    <div class="mf"><button class="btn sec" onclick="closeModal()">Schließen</button></div>`);
}
window.outlookMenu=outlookMenu;window.fetchOutlookInquiries=fetchOutlookInquiries;window.importInquiries=importInquiries;window.saveClientId=saveClientId;

/* ============================ Wiring ============================ */
function go(v){state.view=v;state.search="";sel.clear();$("#searchInput").value="";renderAll();}
window.go=go;window.openContact=openContact;window.openCompany=openCompany;window.openDeal=openDeal;window.openActivity=openActivity;window.setCompSort=setCompSort;
window.contactForm=contactForm;window.companyForm=companyForm;window.dealForm=dealForm;window.activityForm=activityForm;
window.saveContact=saveContact;window.saveCompany=saveCompany;window.saveDeal=saveDeal;window.saveActivity=saveActivity;
window.delContact=delContact;window.delCompany=delCompany;window.delDeal=delDeal;window.delActivity=delActivity;
window.toggleAct=toggleAct;window.closeModal=closeModal;
window.toggleSel=toggleSel;window.toggleAllSel=toggleAllSel;window.clearSel=clearSel;window.bulkDelete=bulkDelete;
window.toggleStage=toggleStage;window.showAllStages=showAllStages;window.toggleDealDone=toggleDealDone;window.followUpDeal=followUpDeal;
window.switchProject=switchProject;window.promptNewProject=promptNewProject;window.renameProject=renameProject;window.deleteProject=deleteProject;
window.setLang=setLang;
window.exportMenu=exportMenu;window.exportJSON=exportJSON;window.exportContactsCSV=exportContactsCSV;window.exportCompaniesCSV=exportCompaniesCSV;window.exportDealsCSV=exportDealsCSV;window.exportActivitiesCSV=exportActivitiesCSV;
window.dragStart=dragStart;window.dragOver=dragOver;window.dragLeave=dragLeave;window.dropDeal=dropDeal;

document.querySelectorAll("#nav a").forEach(a=>a.addEventListener("click",()=>go(a.dataset.view)));
$("#searchInput").addEventListener("input",e=>{state.search=e.target.value;renderAll();});
$("#addBtn").addEventListener("click",()=>({contacts:contactForm,companies:companyForm,deals:dealForm,activities:activityForm}[state.view]||(()=>{}))());
$("#importBtn").addEventListener("click",importWizard);
$("#exportBtn").addEventListener("click",exportMenu);
$("#outlookBtn").addEventListener("click",outlookMenu);
$("#connectBtn").addEventListener("click",async()=>{
  if(authUser){ if(confirm("Abmelden?")) doLogout(); return; }
  if(!fileHandle && localStorage.getItem("crm-data") && (db&&(db.contacts.length||db.companies.length||db.deals.length))){
    if(confirm("Bestehende Datei in OneDrive laden?\n\nOK = vorhandene Datei öffnen\nAbbrechen = neue Datei anlegen (aktuelle Daten übernehmen)"))
      return connectFile(true);
    return connectFile(false);
  }
  connectFile(fileHandle?false:confirm("Bestehende CRM-Datei öffnen? (Abbrechen = neue Datei anlegen)"));
});
$("#loginBtn").addEventListener("click",doAuth);
$("#loginToggle").addEventListener("click",()=>setAuthMode(authMode==="signup"?"login":"signup"));
$("#loginPass").addEventListener("keydown",e=>{if(e.key==="Enter")doAuth();});
$("#loginEmail").addEventListener("keydown",e=>{if(e.key==="Enter")$("#loginPass").focus();});

/* Init */
loadLocal();
document.documentElement.lang=lang;
try{const bl=document.querySelector('.brandlogo'); if(bl)document.querySelector('.loginlogo').style.backgroundImage='url('+bl.src+')';}catch(e){}
applyStaticLang();
reconnectProspects();
(async()=>{
  const app=sbInit();
  if(!app){showLogin("Login-Bibliothek nicht geladen (Internet nötig).");setAuthMode("login");return;}
  try{const {data}=await app.auth.getSession(); if(data&&data.session){await onAuth();return;}}catch(e){}
  showLogin(); setAuthMode("login");
})();
</script>
